# ==============================================================
# Jerney - DevSecOps CI/CD Pipeline
# ==============================================================  

name: Jerney DevSecOps Pipeline

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 202533539871.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: dev-cnx-eks-cluster-repository

jobs:

# ==============================================================
# STAGE 1: LINT
# ==============================================================

  lint:
    name: "🔍 Lint Code"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: Run ESLint
        working-directory: ${{ matrix.component }}
        run: npm run lint


# ==============================================================
# STAGE 2: SCA (Dependency Scan)
# ==============================================================

  sca:
    name: "🛡️ Dependency Audit"
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: "${{ matrix.component }}/package-lock.json"

      - name: Install dependencies
        working-directory: ${{ matrix.component }}
        run: npm ci

      - name: npm audit
        working-directory: ${{ matrix.component }}
        run: npm audit --audit-level=high || true


# ==============================================================
# STAGE 3: BUILD IMAGE
# ==============================================================

  build:
    name: "🐳 Build Image"
    runs-on: ubuntu-latest
    needs: sca

    strategy:
      matrix:
        component: [backend, frontend]

    steps:

      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
          -t jerney-${{ matrix.component }}:${{ github.sha }} \
          ./${{ matrix.component }}


# ==============================================================
# STAGE 4: IMAGE SCAN
# ==============================================================

  image-scan:
    name: "🔬 Trivy Image Scan"
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    strategy:
      matrix:
        component: [backend, frontend]

    steps:

      - uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
          -t jerney-${{ matrix.component }}:${{ github.sha }} \
          ./${{ matrix.component }}

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: jerney-${{ matrix.component }}:${{ github.sha }}
          format: table
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH


# ==============================================================
# STAGE 5: PUSH TO ECR (ONLY ON PUSH)
# ==============================================================

  push-image:
    name: "🚀 Push Image to ECR"
    runs-on: ubuntu-latest
    needs: image-scan
    if: github.event_name == 'push'

    strategy:
      matrix:
        component: [backend, frontend]

    steps:

      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::202533539871:role/openIDroleforgithub
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.component }}
          file: ./${{ matrix.component }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}-${{ matrix.component }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
